<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | GameCore Insider</title>
    <style>
        /* ... (Include base styles) ... */
        .contact-form {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid #334155;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="content-body" style="text-align: center;">
        <h1>Get in Touch</h1>
        <p>Have a tech tip, a performance query, or a business inquiry? We’d love to hear from you.</p>
        
        <form class="contact-form">
            <label>Full Name</label>
            <input type="text" placeholder="Your Name" required>
            
            <label>Email Address</label>
            <input type="email" placeholder="email@example.com" required>
            
            <label>Message</label>
            <textarea rows="5" placeholder="How can we help?"></textarea>
            
            <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>

        <p style="color: var(--text-dim); margin-top: 20px;">Direct Email: <strong>contact@gamecoreinsider.com</strong></p>
    </div>

    </body>
</html>
