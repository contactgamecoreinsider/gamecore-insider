<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCore Insider | Next-Gen Gaming News & Tech</title>
    <style>
        :root {
            --primary: #7c4dff;
            --secondary: #00e5ff;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 60px 5%;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .category {
            color: var(--secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            line-height: 1.3;
        }

        .card p {
            color: var(--text-dim);
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .read-more {
            margin-top: 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>GameCore<span>Insider</span></h1>
    <p style="color: var(--text-dim); margin-top: 10px;">Deep Dives into Performance, Emulation, and 2026's Biggest Titles</p>
</header>

<div class="container">
    <div class="grid" id="post-grid">
        </div>
</div>

<script>
    const posts = [
        {
            title: "Crimson Desert PC Optimization Guide",
            cat: "Performance",
            desc: "Achieve a stable 60 FPS in 2026's biggest RPG using mid-tier graphics hardware.",
            url: "crimson-desert-optimization-guide.html"
        },
        {
            title: "Marathon (2026) Starter Guide",
            cat: "Gaming News",
            desc: "Bungie's extraction shooter is brutal. Here are the best factions for new players.",
            url: "marathon-2026-starter-guide.html"
        },
        {
            title: "Switch 2 Boost Mode Explained",
            cat: "Tech",
            desc: "How to tap into extra portable power for the ultimate handheld experience.",
            url: "switch-2-boost-mode-guide.html"
        },
        {
            title: "AI NPCs: Innovation or 'Game Slop'?",
            cat: "Gaming News",
            desc: "A look at how generative AI is changing (and sometimes ruining) modern NPCs.",
            url: "ai-npcs-innovation-or-slop.html"
        },
        {
            title: "Mid-Tier PC Maintenance Guide",
            cat: "Performance",
            desc: "Keep your hardware running like new with these essential cooling and cleaning tips.",
            url: "mid-tier-hardware-maintenance-guide.html"
        },
        {
            title: "Optimizing BotW on Mobile",
            cat: "Emulation",
            desc: "How to use UltraCam and 60FPS mods for the smoothest experience.",
            url: "botw-mobile-optimization.html"
        },
        {
            title: "Cemu vs Yuzu: 2026 Comparison",
            cat: "Emulation",
            desc: "Which emulator reigns supreme for Nintendo titles this year?",
            url: "emulator-comparison-2026.html"
        },
        {
            title: "Valorant Ranking System 2026",
            cat: "Competitive",
            desc: "A deep dive into the new MMR adjustments and seasonal rewards.",
            url: "valorant-ranking-2026.html"
        },
        {
            title: "EA FC 26: What to Expect",
            cat: "Gaming News",
            desc: "Breakdown of the new Career Mode features and HyperMotion 4.0.",
            url: "ea-fc-26-features.html"
        },
        {
            title: "Fixing Xbox Controller Stick Drift",
            cat: "Hardware",
            desc: "A hands-on repair guide for swapping analog modules safely.",
            url: "controller-repair-guide.html"
        },
        {
            title: "Building a YouTube Gaming Brand",
            cat: "Content Creation",
            desc: "How to design banners and logos that attract subscribers in 2026.",
            url: "gaming-brand-building.html"
        },
        {
            title: "TikTok Live Studio Best Settings",
            cat: "Streaming",
            desc: "Optimizing your bitrate and encoder for a lag-free mobile stream.",
            url: "tiktok-live-settings.html"
        },
        {
            title: "Vinícius Júnior: Season Stats",
            cat: "Football",
            desc: "Analyzing the performance of the world's most dangerous winger.",
            url: "vinicius-stats-2026.html"
        },
        {
            title: "Top 5 Mobile Gaming Controllers",
            cat: "Hardware",
            desc: "The best physical controls for competitive mobile gaming.",
            url: "mobile-controllers-review.html"
        },
        {
            title: "The Future of Cloud Gaming",
            cat: "Tech",
            desc: "Will low-latency cloud gaming replace the home console by 2030?",
            url: "future-of-cloud-gaming.html"
        }
    ];

    const grid = document.getElementById('post-grid');

    posts.forEach(post => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = post.url;
        card.innerHTML = `
            <div class="category">${post.cat}</div>
            <h3>${post.title}</h3>
            <p>${post.desc}</p>
            <div class="read-more">Read Article →</div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
