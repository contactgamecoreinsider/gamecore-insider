<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCore Insider | Gaming Tech & Performance</title>
    <style>
        :root {
            --primary: #7c4dff;
            --secondary: #00e5ff;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding-top: 70px; /* Space for fixed nav */
        }

        /* Restoration of the Professional Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: 70px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: #fff;
        }

        .logo span { color: var(--secondary); }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--secondary); }

        header {
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Improved Card Style */
        .card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .cat-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            line-height: 1.2;
        }

        .card p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .btn-text {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
        }

        /* Footer for AdSense Compliance */
        footer {
            border-top: 1px solid #334155;
            padding: 50px 5%;
            text-align: center;
            background: #0a0f1d;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.85rem;
        }

        .footer-links a:hover { color: #fff; }

        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">GameCore<span>Insider</span></a>
    <div class="nav-links">
        <a href="#news">News</a>
        <a href="#tech">Tech</a>
        <a href="#performance">Performance</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<header>
    <h1>Next-Gen Gaming Insights</h1>
    <p style="color: var(--text-dim); max-width: 600px; margin: 20px auto;">The latest in performance optimization, competitive gaming, and industry-shaping technology.</p>
</header>

<div class="container">
    <div class="grid" id="main-grid"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
        <a href="contact.html">Contact Us</a>
        <a href="about.html">About</a>
    </div>
    <p style="color: #475569; font-size: 0.8rem; margin-top: 20px;">&copy; 2026 GameCore Insider. All rights reserved.</p>
</footer>

<script>
    const posts = [
        { title: "Crimson Desert PC Optimization Guide", cat: "Performance", desc: "Achieve a stable 60 FPS in 2026's biggest RPG using mid-tier graphics hardware.", url: "crimson-desert-optimization-guide.html" },
        { title: "Marathon (2026) Starter Guide", cat: "Gaming News", desc: "Bungie's extraction shooter is brutal. Here are the best factions for new players.", url: "marathon-2026-starter-guide.html" },
        { title: "Switch 2 Boost Mode Explained", cat: "Tech", desc: "How to tap into extra portable power for the ultimate handheld experience.", url: "switch-2-boost-mode-guide.html" },
        { title: "AI NPCs: Innovation or 'Game Slop'?", cat: "Gaming News", desc: "A look at how generative AI is changing (and sometimes ruining) modern NPCs.", url: "ai-npcs-innovation-or-slop.html" },
        { title: "Mid-Tier PC Maintenance Guide", cat: "Performance", desc: "Keep your hardware running like new with these essential cooling and cleaning tips.", url: "mid-tier-hardware-maintenance-guide.html" },
        { title: "Optimizing BotW on Mobile", cat: "Emulation", desc: "How to use UltraCam and 60FPS mods for the smoothest experience.", url: "botw-mobile-optimization.html" },
        { title: "Cemu vs Yuzu: 2026 Comparison", cat: "Emulation", desc: "Which emulator reigns supreme for Nintendo titles this year?", url: "emulator-comparison-2026.html" },
        { title: "Valorant Ranking System 2026", cat: "Competitive", desc: "A deep dive into the new MMR adjustments and seasonal rewards.", url: "valorant-ranking-2026.html" },
        { title: "EA FC 26: What to Expect", cat: "Gaming News", desc: "Breakdown of the new Career Mode features and HyperMotion 4.0.", url: "ea-fc-26-features.html" },
        { title: "Fixing Xbox Controller Stick Drift", cat: "Hardware", desc: "A hands-on repair guide for swapping analog modules safely.", url: "controller-repair-guide.html" },
        { title: "Building a YouTube Gaming Brand", cat: "Content Creation", desc: "How to design banners and logos that attract subscribers in 2026.", url: "gaming-brand-building.html" },
        { title: "TikTok Live Studio Best Settings", cat: "Streaming", desc: "Optimizing your bitrate and encoder for a lag-free mobile stream.", url: "tiktok-live-settings.html" },
        { title: "Vinícius Júnior: Season Stats", cat: "Football", desc: "Analyzing the performance of the world's most dangerous winger.", url: "vinicius-stats-2026.html" },
        { title: "Top 5 Mobile Gaming Controllers", cat: "Hardware", desc: "The best physical controls for competitive mobile gaming.", url: "mobile-controllers-review.html" },
        { title: "The Future of Cloud Gaming", cat: "Tech", desc: "Will low-latency cloud gaming replace the home console by 2030?", url: "future-of-cloud-gaming.html" }
    ];

    const grid = document.getElementById('main-grid');
    grid.innerHTML = posts.map(post => `
        <a href="${post.url}" class="card">
            <div class="cat-tag">${post.cat}</div>
            <h3>${post.title}</h3>
            <p>${post.desc}</p>
            <div class="btn-text">READ ARTICLE &rarr;</div>
        </a>
    `).join('');
</script>

</body>
</html>
