<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCore Insider | Next-Gen Gaming News & Tech</title>
    <style>
        :root {
            --primary: #7c4dff;
            --secondary: #00e5ff;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding-top: 80px;
        }

        /* Fixed Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: 70px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-decoration: none;
            color: #fff;
        }

        .logo span { color: var(--secondary); }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 60px 5%;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .category {
            color: var(--secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card h3 { margin: 0 0 15px 0; font-size: 1.4rem; }

        .card p { color: var(--text-dim); font-size: 0.95rem; flex-grow: 1; }

        footer {
            margin-top: 60px;
            padding: 40px 5%;
            border-top: 1px solid #334155;
            text-align: center;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">GameCore<span>Insider</span></a>
    <div class="nav-links">
        <a href="#" onclick="filterCategory('Gaming News')">News</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
    </div>
</nav>

<header>
    <h1>GameCore<span>Insider</span></h1>
    <p style="color: var(--text-dim); margin-top: 10px;">Hardware, Performance, and Technical Deep Dives</p>
</header>

<div class="container">
    <div class="grid" id="post-grid"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </div>
</footer>

<script>
    const posts = [
        /* The 5 New Articles */
        { title: "Crimson Desert PC Optimization Guide", cat: "Performance", desc: "Achieve a stable 60 FPS in 2026's biggest RPG.", url: "crimson-desert-optimization-guide.html" },
        { title: "Marathon (2026) Starter Guide", cat: "Gaming News", desc: "Bungie's extraction shooter is brutal. Here are the best factions.", url: "marathon-2026-starter-guide.html" },
        { title: "Switch 2 Boost Mode Explained", cat: "Tech", desc: "How to tap into extra portable power for the ultimate handheld experience.", url: "switch-2-boost-mode-guide.html" },
        { title: "AI NPCs: Innovation or 'Game Slop'?", cat: "Tech", desc: "How generative AI is changing (and sometimes ruining) modern NPCs.", url: "ai-npcs-innovation-or-slop.html" },
        { title: "Mid-Tier PC Maintenance Guide", cat: "Hardware", desc: "Essential cooling and cleaning tips for your gaming rig.", url: "mid-tier-hardware-maintenance-guide.html" },
        
        /* The Original 10 Articles from your Files */
        { title: "Best Budget Gaming Rig 2026", cat: "Hardware", desc: "The best price-to-performance parts for 1080p and 1440p gaming.", url: "best-budget-gaming-rig-2026.html" },
        { title: "Best Gaming Settings Guide", cat: "Performance", desc: "Universal settings to improve visibility and reduce latency.", url: "best-gaming-settings-guide.html" },
        { title: "The Denuvo Controversy 2026", cat: "News", desc: "An updated look at DRM's impact on CPU performance.", url: "denuvo-controversy-2026.html" },
        { title: "FPS Optimization Masterclass", cat: "Performance", desc: "Deep dive into kernel-level tweaks and registry optimizations.", url: "fps-optimization-guide.html" },
        { title: "Future of Gaming Subscriptions", cat: "News", desc: "Are we moving to a 'No Ownership' future for digital games?", url: "future-of-gaming-subscriptions.html" },
        { title: "The Future of Neural Rendering", cat: "Tech", desc: "How AI-generated pixels are replacing traditional rasterization.", url: "future-of-neural-rendering.html" },
        { title: "Handheld Emulation Guide", cat: "Emulation", desc: "Ultimate setup guide for playing console classics on mobile hardware.", url: "handheld-emulation-guide.html" },
        { title: "Hypervisor Safety & Risks", cat: "Security", desc: "Does gaming in a virtual machine compromise your hardware security?", url: "hypervisor-safety-risks.html" },
        { title: "Kernel-Level Anti-Cheat Explained", cat: "Security", desc: "Why modern competitive games need such deep access to your PC.", url: "kernel-level-anticheat-explained.html" },
        { title: "What is a Hypervisor?", cat: "Tech", desc: "A beginner-friendly guide to virtualization and how it affects gaming.", url: "what-is-hypervisor.html" }
    ];

    const grid = document.getElementById('post-grid');
    posts.forEach(post => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = post.url;
        card.innerHTML = `
            <div class="category">${post.cat}</div>
            <h3>${post.title}</h3>
            <p>${post.desc}</p>
            <div style="margin-top: 15px; color: var(--primary); font-weight: bold; font-size: 0.85rem;">Read Article →</div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
